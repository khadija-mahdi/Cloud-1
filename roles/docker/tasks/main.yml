---
- name: Install docker
  apt:
    name: docker.io
    state: present
 
- name: Install prerequisites for adding the Docker APT repository
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker's official GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker APT repository
  apt_repository:
    repo: "deb [arch={{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install Docker Compose V2 plugin
  apt:
    update_cache: yes
    name: docker-compose-plugin
    state: present

- name: Remove legacy docker-compose (v1, deprecated/buggy with modern Docker)
  apt:
    name: docker-compose
    state: absent

- name: Create docker-compose compatibility wrapper around Compose V2
  copy:
    dest: /usr/local/bin/docker-compose
    mode: '0755'
    content: |
      #!/bin/sh
      exec docker compose "$@"

- name: Enable and start docker service
  service:
    name: docker
    enabled: yes
    state: started

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes