---
- name: Create project directory
  file:
    path: /home/ubuntu/cloud-1
    state: directory
    mode: '0755'

- name: Create data directory
  file:
    path: /home/ubuntu/data
    state: directory
    mode: '0755'

- name: Copy srcs to remote server
  copy:
    src: srcs
    dest: /home/ubuntu/cloud-1/

- name: Set DOMAIN_NAME to this host's address
  lineinfile:
    path: /home/ubuntu/cloud-1/srcs/.env
    regexp: '^DOMAIN_NAME='
    line: "DOMAIN_NAME={{ ansible_host | default(inventory_hostname) }}"

- name: Copy Makefile to remote server
  copy:
    src: Makefile
    dest: /home/ubuntu/cloud-1/Makefile
