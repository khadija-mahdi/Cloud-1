---
- name: Install iptables-persistent
  apt:
    name: iptables-persistent
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Allow port 80 through iptables
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "80"
    jump: ACCEPT

- name: Allow port 443 through iptables
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "443"
    jump: ACCEPT

- name: Allow established connections
  iptables:
    chain: INPUT
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT

- name: Allow loopback traffic
  iptables:
    chain: INPUT
    in_interface: lo
    jump: ACCEPT

- name: Allow SSH
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "22"
    jump: ACCEPT

    
- name: Set default policy to DROP for INPUT
  iptables:
    chain: INPUT
    policy: DROP
    
- name: Save iptables rules
  command: netfilter-persistent save

- name: Stop system nginx
  service:
    name: nginx
    state: stopped
    enabled: false